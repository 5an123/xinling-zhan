<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心灵港湾 · 解压小游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #fff3e8;
            font-family: 'Segoe UI', 'Comic Neue', cursive;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .game-card {
            background: #fffef7;
            border-radius: 60px;
            padding: 25px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }
        h2 { color: #e7a87a; margin-bottom: 8px; }
        .game-area {
            background: #fff7ed;
            border-radius: 48px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            min-height: 400px;
        }
        .score-board {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #gameCanvas {
            background: #fdebd0;
            border-radius: 48px;
            display: block;
            margin: 0 auto;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            height: auto;
            background-image: radial-gradient(circle at 10% 30%, #ffe0c4 2%, transparent 2.5%);
            background-size: 28px 28px;
        }
        .game-controls {
            margin-top: 20px;
        }
        button {
            background: #fbc490;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
        }
        .back-home {
            margin-top: 20px;
            text-decoration: none;
            color: #b45f3b;
            background: #ffe1c6;
            padding: 6px 20px;
            border-radius: 30px;
        }
        .info {
            font-size: 0.85rem;
            color: #c08d66;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="game-card">
    <h2>☁️ 抓云朵 · 减压小游戏 ☁️</h2>
    <p>点击飘动的云朵收集放松值，30秒内比比谁更治愈～</p>
    <div class="game-area">
        <div class="score-board">🌸 放松值: <span id="scoreValue">0</span></div>
        <canvas id="gameCanvas" width="500" height="350"></canvas>
        <div class="game-controls">
            <button id="resetGameBtn">🔄 重新开始</button>
        </div>
        <div id="timerText" class="info">⏱️ 剩余时间: 30 秒</div>
    </div>
    <a href="index.html" class="back-home">🍃 返回首页</a>
    
</div>
<script>
    if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0;
    let timeLeft = 30;
    let gameActive = true;
    let animationId = null;
    let clouds = [];
    const CLOUD_COUNT = 6;

    class Cloud {
        constructor(x, y, radius, speedX, speedY) {
            this.x = x; this.y = y; this.radius = radius;
            this.speedX = speedX; this.speedY = speedY;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#fff9f0";
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.fillStyle = "#f0cfaa";
            ctx.font = `${this.radius+6}px "Segoe UI Emoji"`;
            ctx.fillText("☁️", this.x-12, this.y+8);
            ctx.shadowBlur = 0;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x + this.radius > canvas.width) this.x = canvas.width - this.radius;
            if (this.x - this.radius < 0) this.x = this.radius;
            if (this.y + this.radius > canvas.height) this.y = canvas.height - this.radius;
            if (this.y - this.radius < 0) this.y = this.radius;
        }
    }

    function initClouds() {
        clouds = [];
        for (let i = 0; i < CLOUD_COUNT; i++) {
            let radius = 20 + Math.random() * 15;
            let x = Math.random() * (canvas.width - 2*radius) + radius;
            let y = Math.random() * (canvas.height - 2*radius) + radius;
            let speedX = (Math.random() - 0.5) * 1.2;
            let speedY = (Math.random() - 0.5) * 1.2;
            clouds.push(new Cloud(x, y, radius, speedX, speedY));
        }
    }

    function drawBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fee7d4";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // 画草地装饰
        ctx.fillStyle = "#d8b48c";
        for(let i=0;i<15;i++) ctx.fillRect(i*40, canvas.height-12, 18, 12);
    }

    function animate() {
        if (!gameActive) return;
        drawBackground();
        for (let cloud of clouds) {
            cloud.update();
            cloud.draw();
        }
        requestAnimationFrame(animate);
    }

    function handleCanvasClick(e) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;
        for (let i = 0; i < clouds.length; i++) {
            const c = clouds[i];
            const dx = mouseX - c.x;
            const dy = mouseY - c.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist <= c.radius + 8) {
                score++;
                document.getElementById('scoreValue').innerText = score;
                // 云朵重生到随机位置
                clouds[i].x = Math.random() * (canvas.width - 2*c.radius) + c.radius;
                clouds[i].y = Math.random() * (canvas.height - 2*c.radius) + c.radius;
                // 播放愉快反馈
                break;
            }
        }
    }

    let timerInterval;
    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameActive = false;
                alert(`🎉 游戏结束！你的放松值: ${score}  🌟 深吸一口气，你超棒！`);
                cancelAnimationFrame(animationId);
                return;
            }
            timeLeft--;
            document.getElementById('timerText').innerText = `⏱️ 剩余时间: ${timeLeft} 秒`;
        }, 1000);
    }

    function resetGame() {
        score = 0;
        timeLeft = 30;
        gameActive = true;
        document.getElementById('scoreValue').innerText = '0';
        document.getElementById('timerText').innerText = '⏱️ 剩余时间: 30 秒';
        if (timerInterval) clearInterval(timerInterval);
        initClouds();
        startTimer();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(animate);
    }

    canvas.addEventListener('click', handleCanvasClick);
    document.getElementById('resetGameBtn').addEventListener('click', resetGame);
    initClouds();
    startTimer();
    animationId = requestAnimationFrame(animate);
</script>
</body>
</html>
