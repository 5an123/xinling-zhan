<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心灵港湾 · 登录注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #fff9f0 0%, #fff0e0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'PingFang SC', 'Microsoft YaHei', cursive, sans-serif;
            padding: 20px;
        }
        .card {
            background: #fffef7;
            border-radius: 64px;
            padding: 2rem 2rem 2.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            border: 1px solid #ffe0c0;
            text-align: center;
        }
        /* 【此处放即梦图片】logo占位 */
        .logo-area {
            width: 100px;
            height: 100px;
            background: #ffe1b9;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 8px 14px rgba(0,0,0,0.05);
        }
        h1 {
            color: #e7a87a;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .sub {
            color: #c08a62;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            font-weight: bold;
            color: #b45f3b;
            margin-left: 12px;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #ffe0bf;
            background: #fffcf5;
            font-family: inherit;
            font-size: 1rem;
            margin-top: 6px;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #ffbc7a;
            box-shadow: 0 0 0 3px rgba(255,188,122,0.2);
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        .checkbox input {
            width: 20px;
            margin: 0;
        }
        button {
            background: #fbc490;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #5e3a28;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-top: 8px;
            font-family: inherit;
        }
        button:hover {
            background: #ffb46e;
            transform: scale(0.98);
        }
        .toggle {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #bc8a62;
        }
        .toggle span {
            color: #e7a87a;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }
        .error-msg {
            color: #e6845c;
            font-size: 0.8rem;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-area">🌸</div>
    <!-- 此处可替换为【此处放即梦图片】例如治愈插画 -->
    <h1>心灵港湾</h1>
    <div class="sub">登录 · 注册 · 安心树洞</div>

    <div id="loginPanel">
        <div class="input-group">
            <label>🧸 用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="off">
        </div>
        <div class="input-group">
            <label>🔒 密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        <div class="checkbox">
            <input type="checkbox" id="rememberMe"> <label style="margin-left: 0;">记住我</label>
        </div>
        <button id="loginBtn">🍃 登录 · 治愈之旅</button>
        <div class="toggle">还没有小窝？ <span id="toRegister">点我注册新账号</span></div>
        <div id="loginError" class="error-msg"></div>
    </div>

    <div id="registerPanel" style="display: none;">
        <div class="input-group">
            <label>🧸 用户名</label>
            <input type="text" id="regUsername" placeholder="4~12个字符">
        </div>
        <div class="input-group">
            <label>🔒 密码</label>
            <input type="password" id="regPassword" placeholder="不少于4位">
        </div>
        <button id="registerBtn">✨ 注册新账号</button>
        <div class="toggle">已有账号？ <span id="toLogin">返回登录</span></div>
        <div id="regError" class="error-msg"></div>
    </div>
</div>

<script>
    // 初始化用户数据 localStorage
    if (!localStorage.getItem('users')) {
        // 预设一个demo用户
        const defaultUsers = [{ username: '小暖阳', password: '123456' }];
        localStorage.setItem('users', JSON.stringify(defaultUsers));
    }

    // 检查是否已登录，若已登录直接跳转首页
    if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = 'index.html';
    }

    // 记住我功能：加载记住的用户名
    if (localStorage.getItem('rememberedUser')) {
        document.getElementById('loginUsername').value = localStorage.getItem('rememberedUser');
        document.getElementById('rememberMe').checked = true;
    }

    // 切换面板
    const loginPanel = document.getElementById('loginPanel');
    const registerPanel = document.getElementById('registerPanel');
    document.getElementById('toRegister').addEventListener('click', () => {
        loginPanel.style.display = 'none';
        registerPanel.style.display = 'block';
        clearErrors();
    });
    document.getElementById('toLogin').addEventListener('click', () => {
        registerPanel.style.display = 'none';
        loginPanel.style.display = 'block';
        clearErrors();
    });

    function clearErrors() {
        document.getElementById('loginError').innerText = '';
        document.getElementById('regError').innerText = '';
    }

    // 注册逻辑
    document.getElementById('registerBtn').addEventListener('click', () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const regError = document.getElementById('regError');
        if (!username || username.length < 2) {
            regError.innerText = '用户名至少2个字符哟';
            return;
        }
        if (!password || password.length < 4) {
            regError.innerText = '密码不能少于4位';
            return;
        }
        let users = JSON.parse(localStorage.getItem('users'));
        if (users.find(u => u.username === username)) {
            regError.innerText = '用户名已存在，换一个吧~';
            return;
        }
        users.push({ username, password });
        localStorage.setItem('users', JSON.stringify(users));
        alert('✨ 注册成功！快去登录开启治愈之旅吧');
        // 切换到登录并自动填充
        document.getElementById('loginUsername').value = username;
        registerPanel.style.display = 'none';
        loginPanel.style.display = 'block';
        clearErrors();
    });

    // 登录逻辑
    document.getElementById('loginBtn').addEventListener('click', () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const remember = document.getElementById('rememberMe').checked;
        const loginError = document.getElementById('loginError');

        if (!username || !password) {
            loginError.innerText = '请输入用户名和密码~';
            return;
        }
        let users = JSON.parse(localStorage.getItem('users'));
        const user = users.find(u => u.username === username && u.password === password);
        if (!user) {
            loginError.innerText = '用户名或密码错误，再试试吧 🌸';
            return;
        }
        // 登录成功
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('currentUser', username);
        if (remember) {
            localStorage.setItem('rememberedUser', username);
        } else {
            localStorage.removeItem('rememberedUser');
        }
        // 跳转到首页
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
